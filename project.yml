name: OnPurposePlannerNative
options:
  bundleIdPrefix: com.onpurpose
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "2" # iPad only
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    SUPPORTS_MACCATALYST: "NO"

targets:
  OnPurposePlannerNative:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OnPurposePlannerNative
        excludes: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onpurpose.planner.native
        INFOPLIST_FILE: OnPurposePlannerNative/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_VERSION: "5.9"
    info:
      path: OnPurposePlannerNative/Info.plist
      properties:
        CFBundleDisplayName: OnPurpose Planner
        CFBundleName: OnPurposePlannerNative
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleDefault
        UILaunchScreen:
          UIColorName: ""
        NSPhotoLibraryUsageDescription: "Used to attach photos to planner pages."
    scheme:
      testTargets: []
